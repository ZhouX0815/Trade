name: Notify Telegram when README updates

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare data
        run: |
          git log -1 --pretty=format:"%s" > /tmp/commit_msg.txt
          git log -1 --pretty=format:"%an" > /tmp/commit_author.txt
          git log -1 --pretty=format:"%ci" > /tmp/commit_time.txt
          cp README.md /tmp/readme_content.txt

      - name: Write Python script
        run: |
          cat > /tmp/send.py << 'PYEOF'
          import urllib.request, json, os, time
          token   = os.environ["BOT_TOKEN"]
          chat_id = os.environ["CHAT_ID"]
          commit_msg    = open("/tmp/commit_msg.txt").read().strip()
          commit_author = open("/tmp/commit_author.txt").read().strip()
          commit_time   = open("/tmp/commit_time.txt").read().strip()
          readme        = open("/tmp/readme_content.txt").read()
          def send(text):
              data = json.dumps({"chat_id": chat_id, "text": text, "disable_web_page_preview": True}).encode("utf-8")
              req  = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data, headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req) as r:
                  print(r.read().decode())
          header = (
              "README.md 已更新\n\n"
              f"作者：{commit_author}\n"
              f"提交：{commit_msg}\n"
              f"时间：{commit_time}\n"
              "链接：https://github.com/ZhouX0815/Trade\n\n"
              "--------------------\n"
              "最新内容：\n\n"
          )
          full = header + readme
          if len(full) <= 4000:
              send(full)
          else:
              send(header)
              parts = [readme[i:i+3800] for i in range(0, len(readme), 3800)]
              for idx, part in enumerate(parts, 1):
                  send(f"内容（第 {idx} 段）：\n\n{part}")
                  time.sleep(1)
          PYEOF

      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003751294383"
        run: python3 /tmp/send.py