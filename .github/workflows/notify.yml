name: Notify Telegram when README updates

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003751294383"
        run: |
          git log -1 --pretty=format:"%s" > /tmp/commit_msg.txt
          git log -1 --pretty=format:"%an" > /tmp/commit_author.txt
          git log -1 --pretty=format:"%ci" > /tmp/commit_time.txt
          cp README.md /tmp/readme_content.txt

          python3 << 'EOF'
import urllib.request, json, os, time

token   = os.environ["BOT_TOKEN"]
chat_id = os.environ["CHAT_ID"]

commit_msg    = open("/tmp/commit_msg.txt").read().strip()
commit_author = open("/tmp/commit_author.txt").read().strip()
commit_time   = open("/tmp/commit_time.txt").