name: Notify Telegram when README updates

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003751294383"
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_TIME=$(git log -1 --pretty=format:"%ci")
          README_CONTENT=$(cat README.md)

          send_message() {
            local TEXT="$1"
            python3 - <<PYEOF
import urllib.request, urllib.parse, json, os

token = os.environ["BOT_TOKEN"]
chat_id = os.environ["CHAT_ID"]
text = """$TEXT"""

data = json.dumps({
    "chat_id": chat_id,
    "text": text,
    "disable_web_page_preview": True
}).encode("utf-8")

req = urllib.request.Request(
    f"https://api.telegram.org/bot{token}/sendMessage",
    data=data,
    headers={"Content-Type": "application/json"}
)
resp = urllib.request.urlopen(req)
print(resp.read().decode())
PYEOF
          }

          HEADER=$(printf "📢 README.md 已更新\n\n👤 作者：%s\n💬 提交：%s\n🕐 时间：%s\n🔗 https://github.com/ZhouX0815/Trade\n\n━━━━━━━━━━━━━━━━━━━━\n📄 最新内容：\n\n" \
            "$COMMIT_AUTHOR" "$COMMIT_MSG" "$COMMIT_TIME")

          FULL_MSG="${HEADER}${README_CONTENT}"
          FULL_LEN=${#FULL_MSG}
          TOTAL_LEN=${#README_CONTENT}

          if [ "$FULL_LEN" -le 4000 ]; then
            send_message "$FULL_MSG"
          else
            send_message "$HEADER"
            CHUNK_SIZE=3800
            START=0
            PART=1
            while [ "$START" -lt "$TOTAL_LEN" ]; do
              CHUNK="${README_CONTENT:$START:$CHUNK_SIZE}"
              send_message "$(printf '📄 内容（第 %d 段）：\n\n%s' $PART "$CHUNK")"
              START=$((START + CHUNK_SIZE))
              PART=$((PART + 1))
              sleep 1
            done
          fi