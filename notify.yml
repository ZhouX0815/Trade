name: Notify Telegram when README updates

on:
  push:
    paths:
      - 'README.md'   # 只监控这个文件

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read README content
        id: content
        run: |
          # 读取最新 README 内容（最多 3800 字符，避免超 Telegram 限制）
          CONTENT=$(cat README.md | head -c 3800)
          # 用 base64 传递避免换行符问题
          echo "content=$(echo "$CONTENT" | base64 -w 0)" >> $GITHUB_OUTPUT

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 还原 README 内容
          README=$(echo "${{ steps.content.outputs.content }}" | base64 -d)
          
          # 拼接消息
          MESSAGE="📢 README.md 已更新

👤 作者：${{ steps.content.outputs.commit_author }}
💬 提交：${{ steps.content.outputs.commit_msg }}
🔗 https://github.com/ZhouX0815/Trade

📄 最新内容：

${README}"

          # 发送到 Telegram
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
```

---

## 完成！工作流程
```
你推送更新 README.md
        ↓
GitHub Actions 自动触发
        ↓
读取最新 README 内容
        ↓
Telegram Bot 发送到频道
